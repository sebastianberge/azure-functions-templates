name: Scaffold module from issue

on:
    issues:
        types: [opened]

permissions:
    contents: write
    pull-requests: write

jobs:
    scaffold:
        if: contains(github.event.issue.labels.*.name, 'scaffold')
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Parse issue and generate files
              run: |
                  python scripts/scaffold_from_issue.py
              env:
                  ISSUE_BODY: ${{ github.event.issue.body }}
                  ISSUE_NUMBER: ${{ github.event.issue.number }}
                  ISSUE_TITLE: ${{ github.event.issue.title }}

            - name: Read generated branch name
              id: branchinfo
              run: |
                  echo "branch_name=$(cat .generated_branch_name)" >> $GITHUB_OUTPUT

            - name: Create Pull Request
              uses: peter-evans/create-pull-request@v7
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  commit-message: "chore: scaffold module from issue #${{ github.event.issue.number }}"
                  branch: ${{ steps.branchinfo.outputs.branch_name }}
                  title: "Scaffold module from issue #${{ github.event.issue.number }}"
                  body: |
                      Opprettet automatisk fra issue #${{ github.event.issue.number }}.

                      Kilde-issue:
                      - ${{ github.event.issue.html_url }}

                      Verifiser gjerne:
                      - mappestruktur
                      - boilerplate-filer
                      - naming
                  base: main
